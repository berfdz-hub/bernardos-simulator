// ─── SIMULATION ENGINE ───────────────────────────────────────────────────────
function simScore(tA, tB, variance) {
  const sa = BASE_STR[tA]||45, sb = BASE_STR[tB]||45;
  const diff = sa - sb;
  const noise = () => (Math.random()+Math.random()+Math.random()-1.5) * variance * 0.07;
  const ag = Math.max(0, Math.round(1.2 + diff*0.035 + noise()));
  const bg = Math.max(0, Math.round(1.2 - diff*0.035 + noise()));
  return [ag, bg];
}

function simKO(tA, tB, variance, bias) {
  if (!tA || !tB || tA === tB) return { a:tA||"TBD", b:tB||"TBD", sa:0, sb:0, w:tA||tB };
  let [sa, sb] = simScore(tA, tB, variance);
  if (sa === sb) {
    const pA = bias*(BASE_STR[tA]||45)/((BASE_STR[tA]||45)+(BASE_STR[tB]||45)) + (1-bias)*0.5;
    if (Math.random() < pA) sa++; else sb++;
  }
  return { a:tA, b:tB, sa, sb, w:sa>sb?tA:tB };
}

function simGroup(teams, variance, bias) {
  const pts={}, gf={}, ga={}, wins={}, draws={}, losses={};
  teams.forEach(t => { pts[t]=0; gf[t]=0; ga[t]=0; wins[t]=0; draws[t]=0; losses[t]=0; });
  const matches = [];
  for (let i=0; i<teams.length; i++) {
    for (let j=i+1; j<teams.length; j++) {
      const ta=teams[i], tb=teams[j];
      const [sa,sb] = simScore(ta, tb, variance);
      gf[ta]+=sa; ga[ta]+=sb; gf[tb]+=sb; ga[tb]+=sa;
      if (sa>sb)      { pts[ta]+=3; wins[ta]++; losses[tb]++; }
      else if (sb>sa) { pts[tb]+=3; wins[tb]++; losses[ta]++; }
      else            { pts[ta]++; pts[tb]++; draws[ta]++; draws[tb]++; }
      matches.push({ a:ta, b:tb, sa, sb });
    }
  }
  const gd = t => gf[t]-ga[t];
  const sorted = [...teams].sort((tx,ty) =>
    (pts[ty]-pts[tx]) || (gd(ty)-gd(tx)) || (gf[ty]-gf[tx]) || ((BASE_STR[ty]||45)-(BASE_STR[tx]||45))
  );
  return { p1:sorted[0], p2:sorted[1], p3:sorted[2], p4:sorted[3], pts, gf, ga, wins, draws, losses, matches };
}

function runSim(levelId) {
  const lv = LEVELS.find(l => l.id===levelId) || LEVELS[2];
  const { variance, bias } = lv;

  const gr = {};
  Object.entries(GROUPS).forEach(([g,teams]) => { gr[g] = simGroup(teams, variance, bias); });

  const allThirds = Object.entries(gr).map(([g,r]) => ({
    group:g, team:r.p3, pts:r.pts[r.p3], gd:r.gf[r.p3]-r.ga[r.p3], gf:r.gf[r.p3]
  })).sort((tx,ty) =>
    (ty.pts-tx.pts)||(ty.gd-tx.gd)||(ty.gf-tx.gf)||((BASE_STR[ty.team]||45)-(BASE_STR[tx.team]||45))
  );
  const best8 = allThirds.slice(0,8);
  const t3 = {}; best8.forEach(x => { t3[x.group]=x.team; });
  const key = [...best8.map(x=>x.group)].sort().join("");
  const combo = COMBOS[key] ? parseCombo(COMBOS[key]) : null;

  const t3used = new Set();
  const safe3 = g => {
    const t=t3[g]; if(t&&!t3used.has(t)){t3used.add(t);return t;}
    for(const x of best8){if(!t3used.has(x.team)){t3used.add(x.team);return x.team;}} return "TBD";
  };
  const safe3fb = pool => {
    for(const g of pool.split("")){const t=t3[g];if(t&&!t3used.has(t)){t3used.add(t);return t;}}
    for(const x of best8){if(!t3used.has(x.team)){t3used.add(x.team);return x.team;}} return "TBD";
  };

  const opp = combo
    ? {m74:safe3(combo.m74),m77:safe3(combo.m77),m79:safe3(combo.m79),m80:safe3(combo.m80),m81:safe3(combo.m81),m82:safe3(combo.m82),m85:safe3(combo.m85),m87:safe3(combo.m87)}
    : {m74:safe3fb("ABCDF"),m77:safe3fb("CDFGH"),m79:safe3fb("CEFHI"),m80:safe3fb("EHIJK"),m81:safe3fb("BEFIJ"),m82:safe3fb("AEHIJ"),m85:safe3fb("EFGIJ"),m87:safe3fb("DEIJL")};

  const mk = (id, tA, tB) => { const m=simKO(tA,tB,variance,bias); return {...m,id,venue:KO_VENUES[id]||"TBD"}; };

  const r32 = [
    mk("M73",gr.A.p2,gr.B.p2), mk("M74",gr.E.p1,opp.m74), mk("M75",gr.F.p1,gr.C.p2), mk("M76",gr.C.p1,gr.F.p2),
    mk("M77",gr.I.p1,opp.m77), mk("M78",gr.E.p2,gr.I.p2), mk("M79",gr.A.p1,opp.m79), mk("M80",gr.L.p1,opp.m80),
    mk("M81",gr.D.p1,opp.m81), mk("M82",gr.G.p1,opp.m82), mk("M83",gr.K.p2,gr.L.p2), mk("M84",gr.H.p1,gr.J.p2),
    mk("M85",gr.B.p1,opp.m85), mk("M86",gr.J.p1,gr.H.p2), mk("M87",gr.K.p1,opp.m87), mk("M88",gr.D.p2,gr.G.p2),
  ];
  const W = {}; r32.forEach(m => { W[m.id]=m.w; });

  const r16 = [
    mk("M89",W.M73,W.M75), mk("M90",W.M74,W.M77), mk("M91",W.M76,W.M78), mk("M92",W.M79,W.M80),
    mk("M93",W.M81,W.M82), mk("M94",W.M83,W.M84), mk("M95",W.M86,W.M88), mk("M96",W.M85,W.M87),
  ];
  r16.forEach(m => { W[m.id]=m.w; });

  const qf = [
    mk("M97",W.M89,W.M90), mk("M98",W.M91,W.M92), mk("M99",W.M93,W.M94), mk("M100",W.M95,W.M96),
  ];
  qf.forEach(m => { W[m.id]=m.w; });

  const sf = [mk("M101",W.M97,W.M98), mk("M102",W.M99,W.M100)];
  sf.forEach(m => { W[m.id]=m.w; });

  const sf1l = sf[0].a===sf[0].w ? sf[0].b : sf[0].a;
  const sf2l = sf[1].a===sf[1].w ? sf[1].b : sf[1].a;
  const bronze = mk("M103",sf1l,sf2l);
  const final  = mk("M104",W.M101,W.M102);

  const CIRCLED = new Set(["M79","M84","M92","M95","M97","M102","M104"]);
  return { gr, best8, r32, r16, qf, sf, bronze, final, CIRCLED };
}

// ─── THEME ───────────────────────────────────────────────────────────────────
const C = {
  bg:"#07090f", surface:"#0d1422", card:"#111827",
  border:"#1c2d45", gold:"#f0c040", goldDim:"#6b5518",
  red:"#c0392b", green:"#219150", blue:"#2471a3",
  text:"#dde3f0", muted:"#5a6a88", accent:"#3478d4",
};
const fl = t => FLAGS[t]||"🏳️";

// ─── BRACKET LAYOUT CONSTANTS ─────────────────────────────────────────────────
const CW = 180;   // card width
const CH = 72;    // card height
const CG = 6;     // gap between cards in same round
const COL = 26;   // horizontal space between columns (for SVG lines)
const HDR = 20;   // header height

function slotY(roundIdx, slotIdx) {
  // vertical centre of card at given round+slot
  const unit = CH + CG;
  const spacing = unit * Math.pow(2, roundIdx);
  const firstTop = HDR + spacing/2 - CH/2;
  return firstTop + slotIdx * spacing + CH/2;
}

const BH = HDR + (CH+CG)*8 + 20; // total bracket height

// ─── BRACKET CARD ────────────────────────────────────────────────────────────
function BCard({ m, circled }) {
  if (!m) return <div style={{width:CW,height:CH,background:C.surface,borderRadius:7,border:`1px solid ${C.border}`}}/>;
  const aw=m.w===m.a, bw=m.w===m.b;
  return (
    <div style={{
      width:CW, background:circled?"linear-gradient(135deg,#1e1900,#0d1500)":C.card,
      border:`1.5px solid ${circled?C.gold:C.border}`, borderRadius:7, padding:"5px 7px",
      boxShadow:circled?`0 0 14px ${C.gold}55`:"0 1px 3px #00000055",
      position:"relative", boxSizing:"border-box",
    }}>
      {circled && <div style={{position:"absolute",top:-6,right:4,fontSize:7,background:C.gold,color:"#000",borderRadius:3,padding:"1px 4px",fontWeight:"800"}}>🟣 TICKET</div>}

        <span style={{maxWidth:84,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.venue}</span>
      </div>
      {[{t:m.a,s:m.sa,w:aw},{t:m.b,s:m.sb,w:bw}].map((row,i) => (
        <div key={i} style={{display:"flex",alignItems:"center",gap:3,padding:"2px 0"}}>

          <span style={{fontSize:12,fontWeight:"900",color:row.w?C.gold:"#777",minWidth:14,textAlign:"right"}}>{row.s}</span>
        </div>

}

// ─── HALF BRACKET ─────────────────────────────────────────────────────────────
// rounds: array of 4 arrays [R32(8), R16(4), QF(2), SF(1)]
// direction: "ltr" (R32 on left) or "rtl" (R32 on right, for right side of bracket)
function HalfBracket({ rounds, direction, circled }) {
  // For LTR: rounds = [R32(8), R16(4), QF(2), SF(1)]
  //   col 0 = R32, col 1 = R16, col 2 = QF, col 3 = SF
  //   slotY(roundIdx, slot) uses roundIdx for spacing — col r has spacing of round r
  //
  // For RTL: rounds = [SF(1), QF(2), R16(4), R32(8)]
  //   col 0 = SF, col 1 = QF, col 2 = R16, col 3 = R32
  //   BUT slotY must use the REAL round size for spacing:
  //   col 0 (SF) needs spacing of round 3, col 1 (QF) needs round 2, etc.
  //   So for RTL: slotY(nC-1-r, s) gives correct spacing

  const ltr = direction === "ltr";
  const nC  = rounds.length; // 4
  const W   = nC * (CW + COL) - COL;

  // Helper: get vertical center of card at column r, slot s
  function cy(r, s) {
    const realRound = ltr ? r : (nC - 1 - r);
    return slotY(realRound, s);
  }

  const lines = [];

  if (ltr) {
    // LTR: col r and col r+1, two cards in col r feed into one in col r+1
    for (let r = 0; r < nC - 1; r++) {
      const nParent = rounds[r+1].length;
      for (let d = 0; d < nParent; d++) {
        const y1 = cy(r,   d*2);
        const y2 = cy(r,   d*2+1);
        const yP = cy(r+1, d);
        const yM = (y1 + y2) / 2;
        const xSrc = r*(CW+COL)+CW;
        const xDst = (r+1)*(CW+COL);
        const xMid = xSrc + COL/2;
        lines.push(<g key={r+"-"+d}>
          <line x1={xSrc} y1={y1} x2={xMid} y2={y1} stroke="#243447" strokeWidth="1.5"/>
          <line x1={xSrc} y1={y2} x2={xMid} y2={y2} stroke="#243447" strokeWidth="1.5"/>
          <line x1={xMid} y1={y1} x2={xMid} y2={y2} stroke="#243447" strokeWidth="1.5"/>
          <line x1={xMid} y1={yM} x2={xDst} y2={yM} stroke="#3478d4" strokeWidth="1.5"/>
          {yM!==yP && <line x1={xDst} y1={yM} x2={xDst} y2={yP} stroke="#3478d4" strokeWidth="1.5"/>}
        </g>);
      }
    }
  } else {
    // RTL: col r+1 has more matches than col r
    // Two cards in col r+1 feed into one card in col r
    for (let r = 0; r < nC - 1; r++) {
      const nParent = rounds[r].length;
      for (let d = 0; d < nParent; d++) {
        const y1 = cy(r+1, d*2);
        const y2 = cy(r+1, d*2+1);
        const yP = cy(r,   d);
        const yM = (y1 + y2) / 2;
        const xSrc = (r+1)*(CW+COL);        // left edge of col r+1 (bigger round)
        const xDst = r*(CW+COL)+CW;          // right edge of col r  (smaller round)
        const xMid = xSrc - COL/2;
        lines.push(<g key={r+"-"+d}>
          <line x1={xSrc} y1={y1} x2={xMid} y2={y1} stroke="#243447" strokeWidth="1.5"/>
          <line x1={xSrc} y1={y2} x2={xMid} y2={y2} stroke="#243447" strokeWidth="1.5"/>
          <line x1={xMid} y1={y1} x2={xMid} y2={y2} stroke="#243447" strokeWidth="1.5"/>
          <line x1={xMid} y1={yM} x2={xDst} y2={yM} stroke="#3478d4" strokeWidth="1.5"/>
          {yM!==yP && <line x1={xDst} y1={yM} x2={xDst} y2={yP} stroke="#3478d4" strokeWidth="1.5"/>}
        </g>);
      }
    }
  }

  const LBLS = ltr ? ["R32","R16","QF","SF"] : ["SF","QF","R16","R32"];

  return (
    <div style={{position:"relative",width:W,height:BH,flexShrink:0}}>
      <svg style={{position:"absolute",top:0,left:0,width:W,height:BH,pointerEvents:"none"}}>{lines}</svg>
      {rounds.map((_,r) => (
        <div key={r} style={{position:"absolute",top:0,left:r*(CW+COL),width:CW,
          textAlign:"center",fontSize:7,color:"#f0c040",fontWeight:"700",letterSpacing:1,
          borderBottom:"1px solid #6b5518",paddingBottom:2}}>
          {LBLS[r]}
        </div>
      ))}
      {rounds.map((ms,r) => ms.map((m,s) => (
        <div key={m?.id||r+"-"+s} style={{position:"absolute",top:cy(r,s)-CH/2,left:r*(CW+COL)}}>
          <BCard m={m} circled={circled?.has ? circled.has(m?.id) : !!(circled&&m&&circled[m?.id])}/>
        </div>
      )))}
    </div>
  );
}

              <tr key={t} style={{borderTop:`1px solid ${C.border}`,background:i===0?"rgba(240,192,64,0.06)":i===1?"rgba(52,120,212,0.06)":i===2?"rgba(33,145,80,0.04)":"transparent"}}>
                <td style={{padding:"5px 6px",textAlign:"center"}}>
                  <span style={{width:16,height:16,borderRadius:3,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:"700",
                    background:i===0?C.gold:i===1?C.accent:i===2?"#1a3a20":"#222",
                    color:i<3?"#000":"#555"}}>{i+1}</span>
                </td>
                <td style={{padding:"5px 6px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <span style={{fontSize:15}}>{fl(t)}</span>
                    <span style={{color:i<2?C.text:i===2?"#8a9ab0":"#4a5a70",fontWeight:i<2?"600":"400",fontSize:11}}>{t}</span>
                    {i===0&&<span style={{fontSize:8,background:C.gold,color:"#000",borderRadius:2,padding:"1px 3px",fontWeight:"800"}}>1ST</span>}
                    {i===1&&<span style={{fontSize:8,background:C.accent,color:"#fff",borderRadius:2,padding:"1px 3px",fontWeight:"800"}}>2ND</span>}
                    {i===2&&<span style={{fontSize:8,background:"#152a1a",color:C.green,borderRadius:2,padding:"1px 3px",fontWeight:"700",border:`1px solid ${C.green}`}}>3RD?</span>}
                  </div>
                </td>
                <td style={{padding:"5px",textAlign:"center"}}><span style={{fontSize:10,color:i<2?C.gold:C.muted,fontWeight:i<2?"700":"400"}}>#{FIFA_RANK[t]||"?"}</span></td>
                {[data.wins[t],data.draws[t],data.losses[t],data.gf[t],data.ga[t]].map((v,j)=>(
                  <td key={j} style={{padding:"5px",textAlign:"center",color:C.muted,fontSize:11}}>{v}</td>
                ))}
                <td style={{padding:"5px",textAlign:"center",color:gd>0?C.green:gd<0?C.red:C.muted,fontWeight:"600",fontSize:11}}>{gd>0?"+":""}{gd}</td>
                <td style={{padding:"5px",textAlign:"center",fontWeight:"800",color:i<2?C.gold:C.text,fontSize:13}}>{data.pts[t]}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
      <div style={{padding:"7px 10px",borderTop:`1px solid ${C.border}`,background:C.surface}}>
        <div style={{fontSize:8,color:C.muted,letterSpacing:2,marginBottom:5}}>MATCH RESULTS</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:3}}>
          {data.matches.map((m,i)=>(
            <div key={i} style={{background:C.card,borderRadius:5,padding:"3px 5px",border:`1px solid ${C.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:3}}>
                <span style={{fontSize:9,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:m.sa>m.sb?C.gold:C.muted}}>{fl(m.a)} {m.a.split(" ")[0]}</span>
                <span style={{fontSize:10,fontWeight:"800",color:"#ddd",whiteSpace:"nowrap"}}>{m.sa}-{m.sb}</span>
                <span style={{fontSize:9,flex:1,textAlign:"right",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:m.sb>m.sa?C.gold:C.muted}}>{m.b.split(" ")[0]} {fl(m.b)}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── MATCH GRID (for R32/R16 tabs) ───────────────────────────────────────────
function MatchGrid({ matches, circled }) {
  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      {matches.map((m,i)=>(
        <div key={i} style={{background:circled.has(m.id)?"rgba(240,192,64,0.05)":C.card,border:`1px solid ${circled.has(m.id)?C.gold:C.border}`,borderRadius:10,padding:"9px 11px",boxShadow:circled.has(m.id)?`0 0 10px ${C.gold}33`:"none"}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:C.muted,marginBottom:5}}>
            <span style={{fontWeight:"700",color:circled.has(m.id)?C.gold:C.muted}}>{m.id}{circled.has(m.id)?" 🟣":""}</span>
            <span style={{maxWidth:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.venue}</span>
          </div>
          {[{t:m.a,s:m.sa,w:m.w===m.a},{t:m.b,s:m.sb,w:m.w===m.b}].map((row,j)=>(
            <div key={j} style={{display:"flex",alignItems:"center",gap:4,marginBottom:j===0?4:0}}>
              <span style={{fontSize:17}}>{fl(row.t)}</span>
              <span style={{fontSize:8.5,color:C.muted,minWidth:22}}>#{FIFA_RANK[row.t]||"?"}</span>
              <span style={{fontSize:12,fontWeight:row.w?"700":"400",color:row.w?C.gold:C.text,flex:1}}>{row.t}</span>
              <span style={{fontSize:14,fontWeight:"800",color:row.w?C.gold:"#888"}}>{row.s}</span>
            </div>
          ))}
          <div style={{marginTop:5,fontSize:9,color:C.green,fontWeight:"700"}}>✓ {fl(m.w)} {m.w} advances</div>
        </div>
      ))}
    </div>
  );
}

// ─── KO CARD (for QF/SF/Final tabs) ──────────────────────────────────────────
function KOCard({ m, circled, size="md" }) {
  const large = size==="lg";
  return (
    <div style={{background:circled?"rgba(240,192,64,0.07)":C.card,border:`${circled?"2":"1"}px solid ${circled?C.gold:C.border}`,borderRadius:12,padding:"10px 12px",boxShadow:circled?`0 0 18px ${C.gold}44`:"none"}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:C.muted,marginBottom:6}}>
        <span style={{fontWeight:"700",color:circled?C.gold:C.muted}}>{m.id}{circled?" 🟣":""}</span>
        <span>{m.venue}</span>
      </div>
      {[{t:m.a,s:m.sa,w:m.w===m.a},{t:m.b,s:m.sb,w:m.w===m.b}].map((row,j)=>(
        <div key={j} style={{display:"flex",alignItems:"center",gap:5,marginBottom:j===0?5:0}}>
          <span style={{fontSize:large?24:20}}>{fl(row.t)}</span>
          <span style={{fontSize:8.5,color:C.muted}}>#{FIFA_RANK[row.t]||"?"}</span>
          <span style={{fontSize:large?14:12,fontWeight:row.w?"700":"400",color:row.w?C.gold:C.text,flex:1}}>{row.t}</span>
          <span style={{fontSize:large?18:15,fontWeight:"900",color:row.w?C.gold:"#888"}}>{row.s}</span>
        </div>
      ))}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [levelId, setLevelId] = useState(3);
  const [sim, setSim]         = useState(null);
  const [tab, setTab]         = useState("groups");
  const [grpPage, setGrpPage] = useState(0);

  const resim = useCallback(() => setSim(runSim(levelId)), [levelId]);
  useEffect(() => { setSim(runSim(levelId)); }, [levelId]);

  if (!sim) return (
    <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.gold,fontFamily:"Georgia",fontSize:18}}>
      ⚽ Simulating…
    </div>
  );

  const TABS = [
    {id:"groups",label:"👥 Groups"},
    {id:"bracket",label:"🏟️ Bracket"},
    {id:"r32",label:"⚔️ R32"},
    {id:"r16",label:"🔵 R16"},
    {id:"qfsf",label:"🔥 QF/SF"},
    {id:"final",label:"🥇 Final"},
    {id:"circled",label:"🟣 My Games"},
  ];

  const circledList = [
    {label:"R32 . Los Angeles",      m:sim.r32.find(m=>m.id==="M84")},
    {label:"R32 . Mexico City",      m:sim.r32.find(m=>m.id==="M79")},
    {label:"R16 . Mexico City",      m:sim.r16.find(m=>m.id==="M92")},
    {label:"R16 . Atlanta",          m:sim.r16.find(m=>m.id==="M95")},
    {label:"QF . Boston",            m:sim.qf.find(m=>m.id==="M97")},
    {label:"SF . Atlanta",           m:sim.sf.find(m=>m.id==="M102")},
    {label:"🏆 Final . New York/NJ", m:sim.final},
  ];

  const curLevel = LEVELS.find(l => l.id===levelId);

  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:"'Georgia',serif",paddingBottom:40}}>

      {/* ── HEADER ── */}
      <div style={{background:"linear-gradient(180deg,#0c1528,#07090f)",borderBottom:`2px solid ${C.gold}`,padding:"12px 14px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div>
            <div style={{fontSize:9,letterSpacing:6,color:C.gold,fontWeight:"700"}}>FIFA™</div>
            <div style={{fontSize:20,fontWeight:"900",color:"#fff",letterSpacing:1}}>WORLD CUP 2026</div>
            <div style={{fontSize:8,color:C.muted,letterSpacing:3}}>FULL TOURNAMENT SIMULATOR . REAL RANKINGS</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:8,color:C.muted,letterSpacing:2}}>CHAMPION</div>
            <div style={{fontSize:17,fontWeight:"700",color:C.gold}}>{fl(sim.final.w)} {sim.final.w}</div>
            <div style={{fontSize:8.5,color:C.muted}}>#{FIFA_RANK[sim.final.w]} . Final {sim.final.sa}-{sim.final.sb} . East Rutherford</div>
          </div>
        </div>

        {/* Level selector */}
        <div style={{marginTop:10}}>
          <div style={{fontSize:8,color:C.muted,letterSpacing:2,marginBottom:6}}>SIMULATION LEVEL</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {LEVELS.map(lv => (
              <button key={lv.id} onClick={()=>setLevelId(lv.id)} style={{
                padding:"4px 8px",borderRadius:7,cursor:"pointer",fontSize:10,fontFamily:"Georgia",
                background:levelId===lv.id?`${LEVEL_COLORS[lv.id]}22`:"transparent",
                color:levelId===lv.id?LEVEL_COLORS[lv.id]:C.muted,
                border:`1.5px solid ${levelId===lv.id?LEVEL_COLORS[lv.id]:C.border}`,
                fontWeight:levelId===lv.id?"700":"400",
              }}>{lv.label}</button>
            ))}
          </div>
          {curLevel && <div style={{marginTop:5,fontSize:8.5,color:LEVEL_COLORS[levelId],fontStyle:"italic"}}>{curLevel.desc}</div>}
        </div>

        <button onClick={resim} style={{marginTop:8,padding:"4px 14px",background:"transparent",border:`1px solid ${C.gold}`,color:C.gold,borderRadius:20,cursor:"pointer",fontSize:10,letterSpacing:1,fontFamily:"Georgia"}}>
          🔄 RE-SIMULATE
        </button>
      </div>

      {/* ── TABS ── */}
      <div style={{display:"flex",overflowX:"auto",borderBottom:`1px solid ${C.border}`,background:C.surface}}>
        {TABS.map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            padding:"9px 12px",whiteSpace:"nowrap",background:"none",border:"none",
            color:tab===t.id?C.gold:C.muted,fontFamily:"Georgia",fontSize:11,
            borderBottom:tab===t.id?`2px solid ${C.gold}`:"2px solid transparent",
            cursor:"pointer",fontWeight:tab===t.id?"700":"400",
          }}>{t.label}</button>
        ))}
      </div>

      <div style={{padding:"12px 14px"}}>

        {/* ── GROUPS ── */}
        {tab==="groups" && (
          <div>
            <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
              {["A-F","G-L"].map((l,i)=>(
                <button key={i} onClick={()=>setGrpPage(i)} style={{padding:"4px 14px",borderRadius:16,border:`1px solid ${grpPage===i?C.gold:C.border}`,background:grpPage===i?"rgba(240,192,64,0.08)":"transparent",color:grpPage===i?C.gold:C.muted,cursor:"pointer",fontSize:10,fontFamily:"Georgia"}}>
                  Groups {l}
                </button>
              ))}
              <span style={{fontSize:8.5,color:C.muted}}>
                Best 3rd: {sim.best8.map(x=>`${x.team.split(" ")[0]}(G${x.group}.#${FIFA_RANK[x.team]||"?"})`).join(", ")}
              </span>
            </div>
            {Object.entries(sim.gr)
              .filter(([g])=>grpPage===0?"ABCDEF".includes(g):"GHIJKL".includes(g))
              .map(([g,data])=><GroupTable key={g} grp={g} data={data}/>)}
          </div>
        )}

        {/* ── BRACKET ── */}
        {tab==="bracket" && <VisualBracket sim={sim}/>}

        {/* ── R32 ── */}
        {tab==="r32" && (
          <div>
            <div style={{fontSize:8.5,color:C.muted,marginBottom:10,letterSpacing:1}}>16 MATCHES . JUNE 28 - JULY 3</div>
            <MatchGrid matches={sim.r32} circled={sim.CIRCLED}/>
          </div>
        )}

        {/* ── R16 ── */}
        {tab==="r16" && (
          <div>
            <div style={{fontSize:8.5,color:C.muted,marginBottom:10,letterSpacing:1}}>8 MATCHES . JULY 4-7</div>
            <MatchGrid matches={sim.r16} circled={sim.CIRCLED}/>
          </div>
        )}

        {/* ── QF / SF ── */}
        {tab==="qfsf" && (
          <div>
            <div style={{fontSize:8.5,color:C.gold,letterSpacing:2,marginBottom:8,fontWeight:"700"}}>QUARTER-FINALS . JULY 9-10</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
              {sim.qf.map((m,i)=><KOCard key={i} m={m} circled={sim.CIRCLED.has(m.id)}/>)}
            </div>
            <div style={{fontSize:8.5,color:C.gold,letterSpacing:2,marginBottom:8,fontWeight:"700"}}>SEMI-FINALS . JULY 13-15</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {sim.sf.map((m,i)=><KOCard key={i} m={m} circled={sim.CIRCLED.has(m.id)}/>)}
            </div>
          </div>
        )}

        {/* ── FINAL ── */}
        {tab==="final" && (
          <div>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"11px",marginBottom:12}}>
              <div style={{fontSize:8.5,color:C.muted,letterSpacing:2,marginBottom:7}}>🥉 THIRD PLACE . {sim.bronze.venue} . July 18</div>
              <KOCard m={sim.bronze} circled={false}/>
            </div>
            <div style={{background:"linear-gradient(135deg,#100d00,#0a1200)",border:`2px solid ${C.gold}`,borderRadius:16,padding:"16px",boxShadow:`0 0 40px ${C.gold}44`,position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 50% 0%,rgba(240,192,64,0.1),transparent 70%)",pointerEvents:"none"}}/>
              <div style={{textAlign:"center",marginBottom:14}}>
                <div style={{fontSize:9,color:C.gold,letterSpacing:5,fontWeight:"700"}}>🏆 THE FINAL</div>
                <div style={{fontSize:10,color:C.muted,marginTop:2}}>M104 . East Rutherford Stadium, New Jersey . July 19 2026</div>
              </div>
              <div style={{display:"flex",justifyContent:"space-around",alignItems:"center"}}>
                {[{t:sim.final.a,s:sim.final.sa},{t:sim.final.b,s:sim.final.sb}].map((side,i)=>{
                  const isW = sim.final.w===side.t;
                  return (
                    <div key={i} style={{textAlign:"center",flex:1}}>
                      <div style={{fontSize:48}}>{fl(side.t)}</div>
                      <div style={{fontSize:9,color:C.muted}}>FIFA #{FIFA_RANK[side.t]||"?"}</div>
                      <div style={{fontSize:13,fontWeight:"700",color:isW?C.gold:C.muted,marginTop:2}}>{side.t}</div>
                      <div style={{fontSize:28,fontWeight:"900",color:isW?C.gold:"#ccc",marginTop:4}}>{side.s}</div>
                      {isW && <div style={{fontSize:9,color:C.gold,marginTop:3,letterSpacing:1}}>🏆 CHAMPION</div>}
                    </div>
                  );
                })}
              </div>
              <div style={{marginTop:14,textAlign:"center",padding:"8px",background:"rgba(240,192,64,0.1)",borderRadius:10,border:`1px solid ${C.goldDim}`}}>
                <div style={{fontSize:26}}>{fl(sim.final.w)}</div>
                <div style={{fontSize:15,fontWeight:"900",color:C.gold}}>{sim.final.w}</div>
                <div style={{fontSize:8.5,color:C.muted,letterSpacing:2}}>FIFA WORLD CUP 2026™ CHAMPION</div>
              </div>
            </div>
          </div>
        )}

        {/* ── MY CIRCLED GAMES ── */}
        {tab==="circled" && (
          <div>
            <div style={{fontSize:8.5,color:C.muted,textAlign:"center",marginBottom:12,letterSpacing:1}}>YOUR 7 PURPLE-CIRCLED GAMES FROM THE SCHEDULE</div>
            {circledList.map(({label,m},i)=>{
              const isFinal = m?.id==="M104";
              return (
                <div key={i} style={{
                  background:isFinal?"linear-gradient(135deg,#130f00,#0a1400)":"linear-gradient(135deg,#160005,#080e1a)",
                  border:`2px solid ${isFinal?C.gold:"#8b1a2a"}`,borderRadius:12,padding:"11px 13px",marginBottom:9,
                  boxShadow:isFinal?`0 0 20px ${C.gold}44`:"0 0 8px #8b1a2a44",
                }}>
                  <div style={{fontSize:8.5,color:isFinal?C.gold:"#e05070",fontWeight:"700",letterSpacing:2,marginBottom:7}}>
                    {isFinal?"🏆":"🟣"} {label}
                  </div>
                  {[{t:m?.a,s:m?.sa,w:m?.w===m?.a},{t:m?.b,s:m?.sb,w:m?.w===m?.b}].map((row,j)=>(
                    <div key={j} style={{display:"flex",alignItems:"center",gap:7,marginBottom:j===0?5:0}}>
                      <span style={{fontSize:22}}>{fl(row.t)}</span>
                      <span style={{fontSize:8.5,color:C.muted}}>#{FIFA_RANK[row.t]||"?"}</span>
                      <span style={{fontSize:13,fontWeight:row.w?"700":"400",color:row.w?C.gold:C.text,flex:1}}>{row.t||"TBD"}</span>
                      <span style={{fontSize:18,fontWeight:"900",color:row.w?C.gold:"#888"}}>{row.s??"-"}</span>
                    </div>
                  ))}
                  <div style={{marginTop:7,padding:"4px 9px",background:isFinal?"rgba(240,192,64,0.1)":"rgba(33,145,80,0.08)",borderRadius:7,fontSize:10,color:isFinal?C.gold:C.green,fontWeight:"700"}}>
                    {isFinal?"🏆":"✓"} Winner: {fl(m?.w)} {m?.w}
                  </div>
                  <div style={{marginTop:3,fontSize:8,color:C.muted}}>Match {m?.id} . {m?.venue}</div>
                </div>
              );
            })}
          </div>
        )}

      </div>

      {/* ── FOOTNOTE ── */}
      <div style={{marginTop:36,padding:"10px 14px",borderTop:`1px solid #131e2e`,textAlign:"center"}}>
        <span style={{fontSize:9,color:"#2a3a52",letterSpacing:2}}>Bernardo&apos;s Simulator . FIFA World Cup 2026™</span>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
</body>
</html>
