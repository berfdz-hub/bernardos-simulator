function parseCombo(raw){const p=raw.split(",");return{m79:p[0],m85:p[1],m81:p[2],m74:p[3],m82:p[4],m77:p[5],m87:p[6],m80:p[7]};}
const fl=t=>FLAGS[t]||"🏳️";

// ── SIMULATION ────────────────────────────────────────────────────────────────
function simScore(tA,tB,variance){
  const sa=BASE_STR[tA]||45,sb=BASE_STR[tB]||45,diff=sa-sb;
  const noise=()=>(Math.random()+Math.random()+Math.random()-1.5)*variance*0.07;
  return[Math.max(0,Math.round(1.2+diff*0.035+noise())),Math.max(0,Math.round(1.2-diff*0.035+noise()))];
}
function simKO(tA,tB,variance,bias){
  if(!tA||!tB||tA===tB)return{a:tA||"TBD",b:tB||"TBD",sa:0,sb:0,w:tA||tB};
  let[sa,sb]=simScore(tA,tB,variance);
  if(sa===sb){const pA=bias*(BASE_STR[tA]||45)/((BASE_STR[tA]||45)+(BASE_STR[tB]||45))+(1-bias)*0.5;if(Math.random()<pA)sa++;else sb++;}
  return{a:tA,b:tB,sa,sb,w:sa>sb?tA:tB};
}
function simGroup(teams,variance){
  const pts={},gf={},ga={},wins={},draws={},losses={};
  teams.forEach(t=>{pts[t]=0;gf[t]=0;ga[t]=0;wins[t]=0;draws[t]=0;losses[t]=0;});
  const matches=[];
  for(let i=0;i<teams.length;i++)for(let j=i+1;j<teams.length;j++){
    const ta=teams[i],tb=teams[j],[sa,sb]=simScore(ta,tb,variance);
    gf[ta]+=sa;ga[ta]+=sb;gf[tb]+=sb;ga[tb]+=sa;
    if(sa>sb){pts[ta]+=3;wins[ta]++;losses[tb]++;}
    else if(sb>sa){pts[tb]+=3;wins[tb]++;losses[ta]++;}
    else{pts[ta]++;pts[tb]++;draws[ta]++;draws[tb]++;}
    matches.push({a:ta,b:tb,sa,sb});
  }
  const gd=t=>gf[t]-ga[t];
  const sorted=[...teams].sort((tx,ty)=>(pts[ty]-pts[tx])||(gd(ty)-gd(tx))||(gf[ty]-gf[tx])||((BASE_STR[ty]||45)-(BASE_STR[tx]||45)));
  return{p1:sorted[0],p2:sorted[1],p3:sorted[2],p4:sorted[3],pts,gf,ga,wins,draws,losses,matches};
}

function runSim(levelId){
  const lv=LEVELS.find(l=>l.id===levelId)||LEVELS[2];
  const{variance,bias}=lv;
  const gr={};
  Object.entries(GROUPS).forEach(([g,teams])=>{gr[g]=simGroup(teams,variance);});
  const allThirds=Object.entries(gr).map(([g,r])=>({group:g,team:r.p3,pts:r.pts[r.p3],gd:r.gf[r.p3]-r.ga[r.p3],gf:r.gf[r.p3]}))
    .sort((tx,ty)=>(ty.pts-tx.pts)||(ty.gd-tx.gd)||(ty.gf-tx.gf)||((BASE_STR[ty.team]||45)-(BASE_STR[tx.team]||45)));
  const best8=allThirds.slice(0,8);
  const t3={};best8.forEach(x=>{t3[x.group]=x.team;});
  const key=[...best8.map(x=>x.group)].sort().join("");
  const combo=COMBOS[key]?parseCombo(COMBOS[key]):null;
  const t3used=new Set();
  const safe3=g=>{const t=t3[g];if(t&&!t3used.has(t)){t3used.add(t);return t;}for(const x of best8){if(!t3used.has(x.team)){t3used.add(x.team);return x.team;}}return "TBD";};
  const safe3fb=pool=>{for(const g of pool.split("")){const t=t3[g];if(t&&!t3used.has(t)){t3used.add(t);return t;}}for(const x of best8){if(!t3used.has(x.team)){t3used.add(x.team);return x.team;}}return "TBD";};
  const opp=combo
    ?{m74:safe3(combo.m74),m77:safe3(combo.m77),m79:safe3(combo.m79),m80:safe3(combo.m80),m81:safe3(combo.m81),m82:safe3(combo.m82),m85:safe3(combo.m85),m87:safe3(combo.m87)}
    :{m74:safe3fb("ABCDF"),m77:safe3fb("CDFGH"),m79:safe3fb("CEFHI"),m80:safe3fb("EHIJK"),m81:safe3fb("BEFIJ"),m82:safe3fb("AEHIJ"),m85:safe3fb("EFGIJ"),m87:safe3fb("DEIJL")};
  const mk=(id,tA,tB)=>{const m=simKO(tA,tB,variance,bias);return{...m,id,venue:KV[id]||"?"};};
  const r32=[
    mk("M73",gr.A.p2,gr.B.p2),mk("M74",gr.E.p1,opp.m74),mk("M75",gr.F.p1,gr.C.p2),mk("M76",gr.C.p1,gr.F.p2),
    mk("M77",gr.I.p1,opp.m77),mk("M78",gr.E.p2,gr.I.p2),mk("M79",gr.A.p1,opp.m79),mk("M80",gr.L.p1,opp.m80),
    mk("M81",gr.D.p1,opp.m81),mk("M82",gr.G.p1,opp.m82),mk("M83",gr.K.p2,gr.L.p2),mk("M84",gr.H.p1,gr.J.p2),
    mk("M85",gr.B.p1,opp.m85),mk("M86",gr.J.p1,gr.H.p2),mk("M87",gr.K.p1,opp.m87),mk("M88",gr.D.p2,gr.G.p2),
  ];
  const W={};r32.forEach(m=>{W[m.id]=m.w;});
  const r16=[mk("M89",W.M73,W.M75),mk("M90",W.M74,W.M77),mk("M91",W.M76,W.M78),mk("M92",W.M79,W.M80),
    mk("M93",W.M81,W.M82),mk("M94",W.M83,W.M84),mk("M95",W.M86,W.M88),mk("M96",W.M85,W.M87)];
  r16.forEach(m=>{W[m.id]=m.w;});
  const qf=[mk("M97",W.M89,W.M90),mk("M98",W.M91,W.M92),mk("M99",W.M93,W.M94),mk("M100",W.M95,W.M96)];
  qf.forEach(m=>{W[m.id]=m.w;});
  const sf=[mk("M101",W.M97,W.M98),mk("M102",W.M99,W.M100)];
  sf.forEach(m=>{W[m.id]=m.w;});
  const sf1l=sf[0].a===sf[0].w?sf[0].b:sf[0].a,sf2l=sf[1].a===sf[1].w?sf[1].b:sf[1].a;
  const bronze=mk("M103",sf1l,sf2l),final=mk("M104",W.M101,W.M102);
  const CIRCLED=new Set(["M79","M84","M92","M95","M97","M102","M104"]);
  return{gr,best8,r32,r16,qf,sf,bronze,final,CIRCLED};
}

// ── THEME ─────────────────────────────────────────────────────────────────────
const C={bg:"#07090f",surface:"#0d1422",card:"#111827",border:"#1c2d45",gold:"#f0c040",
  goldDim:"#6b5518",green:"#219150",red:"#c0392b",text:"#dde3f0",muted:"#5a6a88",accent:"#3478d4"};

// ── BRACKET CONSTANTS ─────────────────────────────────────────────────────────
const CW=178,CH=70,CG=6,COL=24,HDR=20;
const BH=HDR+(CH+CG)*8+20;
function slotY(r,s){const u=CH+CG,sp=u*Math.pow(2,r),ft=HDR+sp/2-CH/2;return ft+s*sp+CH/2;}

// ── COMPONENTS ────────────────────────────────────────────────────────────────
function BCard({m,circled}){
  if(!m)return <div style={{width:CW,height:CH,background:C.surface,borderRadius:7,border:`1px solid ${C.border}`}}/>;
  const aw=m.w===m.a,bw=m.w===m.b;
  return(
    <div style={{width:CW,background:circled?"linear-gradient(135deg,#1e1900,#0d1500)":C.card,
      border:`1.5px solid ${circled?C.gold:C.border}`,borderRadius:7,padding:"5px 7px",
      boxShadow:circled?`0 0 14px ${C.gold}55`:"none",position:"relative",boxSizing:"border-box"}}>
      {circled&&<div style={{position:"absolute",top:-6,right:4,fontSize:7,background:C.gold,color:"#000",borderRadius:3,padding:"1px 4px",fontWeight:"800"}}>🟣</div>}
      <div style={{display:"flex",justifyContent:"space-between",fontSize:7,color:circled?C.gold:C.muted,marginBottom:3}}>
        <b>{m.id}</b><span style={{maxWidth:84,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.venue}</span>
      </div>
      {[{t:m.a,s:m.sa,w:aw},{t:m.b,s:m.sb,w:bw}].map((row,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:3,padding:"2px 0"}}>
          <span style={{fontSize:12,lineHeight:1}}>{fl(row.t)}</span>
          <span style={{fontSize:7,color:C.muted,minWidth:18}}>#{FIFA_RANK[row.t]||"?"}</span>
          <span style={{fontSize:10,fontWeight:row.w?"700":"400",color:row.w?C.gold:C.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.t||"TBD"}</span>
          <b style={{fontSize:12,color:row.w?C.gold:"#777",minWidth:14,textAlign:"right"}}>{row.s}</b>
        </div>
      ))}
    </div>
  );
}

function HalfBracket({rounds,direction,circled}){
  const ltr=direction==="ltr",nC=rounds.length,W=nC*(CW+COL)-COL;
  const lines=[];
  for(let r=0;r<nC-1;r++){
    const nD=rounds[r+1].length;
    for(let d=0;d<nD;d++){
      const s1=d*2,s2=d*2+1,y1=slotY(r,s1),y2=slotY(r,s2),yD=slotY(r+1,d),yM=(y1+y2)/2;
      const cR=ltr?r:nC-1-r,cD=ltr?r+1:nC-2-r;
      const xS=ltr?cR*(CW+COL)+CW:cR*(CW+COL),xD=ltr?cD*(CW+COL):cD*(CW+COL)+CW,xM=ltr?xS+COL/2:xS-COL/2;
      lines.push(<g key={`${r}-${d}`}>
        <line x1={xS} y1={y1} x2={xM} y2={y1} stroke="#243447" strokeWidth="1.5"/>
        <line x1={xS} y1={y2} x2={xM} y2={y2} stroke="#243447" strokeWidth="1.5"/>
        <line x1={xM} y1={y1} x2={xM} y2={y2} stroke="#243447" strokeWidth="1.5"/>
        <line x1={xM} y1={yM} x2={xD} y2={yM} stroke={C.accent} strokeWidth="1.5"/>
        {yM!==yD&&<line x1={xD} y1={yM} x2={xD} y2={yD} stroke={C.accent} strokeWidth="1.5"/>}
      </g>);
    }
  }
  const LBLS=ltr?["R32","R16","QF","SF"]:["SF","QF","R16","R32"];
  return(
    <div style={{position:"relative",width:W,height:BH,flexShrink:0}}>
      <svg style={{position:"absolute",top:0,left:0,width:W,height:BH,pointerEvents:"none"}}>{lines}</svg>
      {rounds.map((_,r)=>{
        const col=ltr?r:nC-1-r;
        return <div key={r} style={{position:"absolute",top:0,left:col*(CW+COL),width:CW,textAlign:"center",fontSize:7,color:C.gold,fontWeight:"700",letterSpacing:1,borderBottom:`1px solid ${C.goldDim}`,paddingBottom:2}}>{LBLS[r]}</div>;
      })}
      {rounds.map((ms,r)=>ms.map((m,s)=>{
        const col=ltr?r:nC-1-r,cy=slotY(r,s);

  );
}

  const L_QF=["M97","M98"].map(id=>sim.qf.find(m=>m.id===id));
  const R_R32=["M81","M82","M83","M84","M85","M86","M87","M88"].map(id=>sim.r32.find(m=>m.id===id));
  const R_R16=["M93","M94","M95","M96"].map(id=>sim.r16.find(m=>m.id===id));

  const FW=190+COL*2,sfY=slotY(3,0);
  return(
    <div style={{overflowX:"auto",paddingBottom:12}}>

      <div style={{display:"flex",alignItems:"flex-start"}}>
        <HalfBracket rounds={[L_R32,L_R16,L_QF,[sim.sf[0]]]} direction="ltr" circled={sim.CIRCLED}/>
        <div style={{width:FW,height:BH,flexShrink:0,position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg style={{position:"absolute",top:0,left:0,width:FW,height:BH,pointerEvents:"none"}}>
            <line x1={0} y1={sfY} x2={COL} y2={sfY} stroke={C.accent} strokeWidth="1.5"/>
            <line x1={COL} y1={sfY} x2={COL} y2={BH/2} stroke={C.accent} strokeWidth="1.5"/>
            <line x1={COL} y1={BH/2} x2={FW/2-95} y2={BH/2} stroke={C.accent} strokeWidth="1.5"/>
            <line x1={FW} y1={sfY} x2={FW-COL} y2={sfY} stroke={C.accent} strokeWidth="1.5"/>
            <line x1={FW-COL} y1={sfY} x2={FW-COL} y2={BH/2} stroke={C.accent} strokeWidth="1.5"/>

        ))}
      </div>
    </div>
  );
}

        <span style={{fontSize:10,color:C.muted,letterSpacing:2}}>GROUP {grp} · {GV[grp]}</span>
      </div>
      <table style={{width:"100%",fontSize:11}}>
        <thead>
          <tr style={{background:C.surface}}>

                  <span style={{width:16,height:16,borderRadius:3,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:"700",background:i===0?C.gold:i===1?C.accent:i===2?"#1a3a20":"#222",color:i<3?"#000":"#555"}}>{i+1}</span>
                </td>
                <td style={{padding:"5px 6px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <span style={{fontSize:15}}>{fl(t)}</span>
                    <span style={{color:i<2?C.text:i===2?"#8a9ab0":"#4a5a70",fontWeight:i<2?"600":"400",fontSize:11}}>{t}</span>

                {[data.wins[t],data.draws[t],data.losses[t],data.gf[t],data.ga[t]].map((v,j)=>(
                  <td key={j} style={{padding:"5px",textAlign:"center",color:C.muted,fontSize:11}}>{v}</td>

              </tr>
            );
          })}
        </tbody>
      </table>
      <div style={{padding:"7px 10px",borderTop:`1px solid ${C.border}`,background:C.surface}}>
        <div style={{fontSize:8,color:C.muted,letterSpacing:2,marginBottom:5}}>MATCH RESULTS</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:3}}>
          {data.matches.map((m,i)=>(
            <div key={i} style={{background:C.card,borderRadius:5,padding:"3px 5px",border:`1px solid ${C.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:3}}>

    </div>

function MCard({m,circled}){

            </div>
            <div style={{background:"linear-gradient(135deg,#100d00,#0a1200)",border:`2px solid ${C.gold}`,borderRadius:16,padding:"16px",boxShadow:`0 0 40px ${C.gold}44`,position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 50% 0%,rgba(240,192,64,0.1),transparent 70%)",pointerEvents:"none"}}/>
              <div style={{textAlign:"center",marginBottom:14}}>
                <div style={{fontSize:9,color:C.gold,letterSpacing:5,fontWeight:"700"}}>🏆 THE FINAL</div>
                <div style={{fontSize:9,color:C.muted,marginTop:2}}>M104 · MetLife Stadium, East Rutherford NJ · July 19 2026</div>
              </div>
              <div style={{display:"flex",justifyContent:"space-around",alignItems:"center"}}>
                {[{t:sim.final.a,s:sim.final.sa},{t:sim.final.b,s:sim.final.sb}].map((side,i)=>{
                  const isW=sim.final.w===side.t;
                  return(
                    <div key={i} style={{textAlign:"center",flex:1}}>
                      <div style={{fontSize:48}}>{fl(side.t)}</div>
                      <div style={{fontSize:9,color:C.muted}}>FIFA #{FIFA_RANK[side.t]||"?"}</div>
                      <div style={{fontSize:13,fontWeight:"700",color:isW?C.gold:C.muted,marginTop:2}}>{side.t}</div>
                      <div style={{fontSize:28,fontWeight:"900",color:isW?C.gold:"#ccc",marginTop:4}}>{side.s}</div>
                      {isW&&<div style={{fontSize:9,color:C.gold,marginTop:3,letterSpacing:1}}>🏆 CHAMPION</div>}
                    </div>
                  );
                })}
              </div>
              <div style={{marginTop:14,textAlign:"center",padding:"8px",background:"rgba(240,192,64,0.1)",borderRadius:10,border:`1px solid ${C.goldDim}`}}>
                <div style={{fontSize:26}}>{fl(sim.final.w)}</div>
                <div style={{fontSize:15,fontWeight:"900",color:C.gold}}>{sim.final.w}</div>
                <div style={{fontSize:8.5,color:C.muted,letterSpacing:2}}>FIFA WORLD CUP 2026™ CHAMPION</div>
              </div>
            </div>
          </div>
        )}

        {tab==="circled"&&(
          <div>
            <div style={{fontSize:8.5,color:C.muted,textAlign:"center",marginBottom:12,letterSpacing:1}}>YOUR 7 PURPLE-CIRCLED GAMES FROM THE SCHEDULE</div>
            {circledList.map(({label,m},i)=>{
              const isFinal=m?.id==="M104";
              return(
                <div key={i} style={{background:isFinal?"linear-gradient(135deg,#130f00,#0a1400)":"linear-gradient(135deg,#160005,#080e1a)",
                  border:`2px solid ${isFinal?C.gold:"#8b1a2a"}`,borderRadius:12,padding:"11px 13px",marginBottom:9,
                  boxShadow:isFinal?`0 0 20px ${C.gold}44`:"0 0 8px #8b1a2a44"}}>
                  <div style={{fontSize:8.5,color:isFinal?C.gold:"#e05070",fontWeight:"700",letterSpacing:2,marginBottom:7}}>{isFinal?"🏆":"🟣"} {label}</div>
                  {[{t:m?.a,s:m?.sa,w:m?.w===m?.a},{t:m?.b,s:m?.sb,w:m?.w===m?.b}].map((row,j)=>(
                    <div key={j} style={{display:"flex",alignItems:"center",gap:7,marginBottom:j===0?5:0}}>
                      <span style={{fontSize:22}}>{fl(row.t)}</span>
                      <span style={{fontSize:8.5,color:C.muted}}>#{FIFA_RANK[row.t]||"?"}</span>
                      <span style={{fontSize:13,fontWeight:row.w?"700":"400",color:row.w?C.gold:C.text,flex:1}}>{row.t||"TBD"}</span>
                      <b style={{fontSize:18,color:row.w?C.gold:"#888"}}>{row.s??"-"}</b>
                    </div>
                  ))}
                  <div style={{marginTop:7,padding:"4px 9px",background:isFinal?"rgba(240,192,64,0.1)":"rgba(33,145,80,0.08)",borderRadius:7,fontSize:10,color:isFinal?C.gold:C.green,fontWeight:"700"}}>
                    {isFinal?"🏆":"✓"} Winner: {fl(m?.w)} {m?.w}
                  </div>
                  <div style={{marginTop:3,fontSize:8,color:C.muted}}>Match {m?.id} · {m?.venue}</div>
                </div>
              );
            })}
          </div>
        )}

      </div>

      <div style={{marginTop:36,padding:"10px 14px",borderTop:`1px solid #131e2e`,textAlign:"center"}}>
        <span style={{fontSize:9,color:"#2a3a52",letterSpacing:2}}>Bernardo's Simulator · FIFA World Cup 2026™</span>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
